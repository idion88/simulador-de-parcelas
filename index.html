<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Parcelas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #f0f2f5;
            --cor-container: #ffffff;
            --cor-texto: #1a1a2e;
            --cor-texto-secundario: #555770;
            --cor-texto-fino: #8a8ca5;
            --cor-borda: #dde1e8;
            --cor-destaque: #3b82f6;
            --cor-aviso: #ef4444;
            --cor-sombra: rgba(0,0,0,0.06);
            --cor-linha: #f7f8fa;
            --cor-linha-hover: #eef2ff;
            --cor-input-bg: #ffffff;
            --cor-botao-tema: #e8eaed;
            --cor-botao-tema-hover: #d3d6db;
            --cor-badge: #3b82f6;
        }

        .tema-escuro {
            --cor-fundo: #0f0f17;
            --cor-container: #1a1a28;
            --cor-texto: #e8e8f0;
            --cor-texto-secundario: #a0a0b8;
            --cor-texto-fino: #6a6a82;
            --cor-borda: #2e2e42;
            --cor-destaque: #60a5fa;
            --cor-aviso: #f87171;
            --cor-sombra: rgba(0,0,0,0.3);
            --cor-linha: #1e1e30;
            --cor-linha-hover: #262644;
            --cor-input-bg: #24243a;
            --cor-botao-tema: #2a2a40;
            --cor-botao-tema-hover: #3a3a55;
            --cor-badge: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cor-fundo);
            padding: 16px;
            padding-bottom: 100px;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .container { max-width: 480px; margin: 0 auto; }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-texto);
            transition: color 0.3s ease;
        }

        .botao-tema {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--cor-botao-tema);
            color: var(--cor-texto);
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .botao-tema:hover { background-color: var(--cor-botao-tema-hover); transform: scale(1.08); }
        .botao-tema:focus-visible { outline: 2px solid var(--cor-destaque); outline-offset: 2px; }

        /* ===== CARD INPUT ===== */
        .card-input {
            background: var(--cor-container);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 6px var(--cor-sombra);
            transition: background-color 0.3s ease;
        }

        .card-input label {
            display: block;
            font-weight: 500;
            color: var(--cor-texto-secundario);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .campo-valor { position: relative; }

        .campo-valor .prefixo {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            font-size: 16px;
            color: var(--cor-texto-fino);
            pointer-events: none;
        }

        .campo-valor input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid var(--cor-borda);
            border-radius: 10px;
            font-size: 22px;
            font-weight: 700;
            font-family: inherit;
            background-color: var(--cor-input-bg);
            color: var(--cor-texto);
            transition: border-color 0.2s ease, background-color 0.3s ease, color 0.3s ease;
        }

        .campo-valor input:focus { outline: none; border-color: var(--cor-destaque); }

        .aviso {
            margin-top: 10px;
            text-align: center;
            color: var(--cor-aviso);
            font-size: 13px;
            font-weight: 700;
            display: none;
        }
        .aviso.visivel {
            display: block;
            animation: fadeSlide 0.25s ease forwards;
        }

        /* ===== DICA — MAIOR E VIBRANTE ===== */
        .dica {
            flex-direction: row;
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--cor-destaque);
            margin-bottom: 14px;
            padding: 12px 16px;
            background: var(--cor-container);
            border-radius: 10px;
            box-shadow: 0 1px 6px var(--cor-sombra);
            border-left: 4px solid var(--cor-destaque);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
            animation: dicaPulse 3s ease-in-out infinite;
        }

        .dica .emoji-dica {
            font-size: 22px;
            flex-shrink: 0;
            animation: apontar 1.5s ease-in-out infinite;
        }

        .tema-escuro .dica {
            background: var(--cor-container);
            border-left-color: var(--cor-destaque);
            color: var(--cor-destaque);
        }

        @keyframes dicaPulse {
            0%, 100% { box-shadow: 0 1px 6px var(--cor-sombra); }
            50%      { box-shadow: 0 2px 16px rgba(59, 130, 246, 0.15); }
        }

        .tema-escuro @keyframes dicaPulse {
            0%, 100% { box-shadow: 0 1px 6px var(--cor-sombra); }
            50%      { box-shadow: 0 2px 16px rgba(96, 165, 250, 0.15); }
        }

        @keyframes apontar {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(6px);
            }
        }

        /* ===== CARD PARCELAS ===== */
        .card-parcelas {
            background: var(--cor-container);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px var(--cor-sombra);
            transition: background-color 0.3s ease;
        }

        .titulo-parcelas {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--cor-texto-fino);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid var(--cor-borda);
        }

        .lista-parcelas { list-style: none; }

        /* ===== LINHA NORMAL ===== */
        .linha-parcela {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px 14px 20px;
            border-bottom: 1px solid var(--cor-borda);
            border-left: 4px solid transparent;
            transition: all 0.25s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .linha-parcela:last-child { border-bottom: none; }
        .linha-parcela:nth-child(odd) { background-color: var(--cor-linha); }
        .linha-parcela:hover { background-color: var(--cor-linha-hover); }

        /* ===== LINHA SELECIONADA ===== */
        .linha-parcela.selecionada {
            background: linear-gradient(135deg, #065f46 0%, #059669 40%, #10b981 100%) !important;
            border-left-color: #34d399;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .tema-escuro .linha-parcela.selecionada {
            background: linear-gradient(135deg, #064e3b 0%, #047857 40%, #10b981 100%) !important;
            animation: glowPulseDark 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0), 0 2px 8px rgba(5,150,105,0.3); }
            50%      { box-shadow: 0 0 0 4px rgba(16,185,129,0.12), 0 4px 16px rgba(5,150,105,0.4); }
        }

        @keyframes glowPulseDark {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0), 0 0 16px rgba(16,185,129,0.15); }
            50%      { box-shadow: 0 0 0 4px rgba(16,185,129,0.15), 0 0 30px rgba(16,185,129,0.25); }
        }

        .linha-parcela.selecionada::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: shineSweep 2.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shineSweep {
            0%   { left: -100%; }
            50%  { left: 150%; }
            100% { left: 150%; }
        }

        .linha-parcela.selecionada .label-parcela,
        .linha-parcela.selecionada .valor-total-linha {
            color: rgba(255,255,255,0.8) !important;
        }

        .linha-parcela.selecionada .valor-parcela {
            color: #ffffff !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        /* ===== LADO ESQUERDO ===== */
        .lado-esquerdo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 28px;
            padding: 0 8px;
            border-radius: 8px;
            background-color: var(--cor-badge);
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .linha-parcela.selecionada .badge {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1a1a2e;
            transform: scale(1.12);
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.5);
            animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes badgePop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.3); }
            100% { transform: scale(1.12); }
        }

        .label-parcela {
            font-size: 14px;
            font-weight: 500;
            color: var(--cor-texto-secundario);
            transition: color 0.3s ease;
        }

        /* ===== LADO DIREITO ===== */
        .lado-direito {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: right;
        }

        .valores { display: flex; flex-direction: column; }

        .valor-parcela {
            font-size: 16px;
            font-weight: 700;
            color: var(--cor-texto);
            transition: color 0.3s ease;
        }

        .valor-total-linha {
            font-size: 11px;
            color: var(--cor-texto-fino);
            margin-top: 1px;
            transition: color 0.3s ease;
        }

        /* ===== CHECK ===== */
        .check-indicator {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid var(--cor-borda);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: transparent;
        }

        .check-indicator svg {
            opacity: 0;
            transform: scale(0) rotate(-45deg);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .linha-parcela.selecionada .check-indicator {
            border-color: #ffffff;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            transform: scale(1.1);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
        }

        .linha-parcela.selecionada .check-indicator svg {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* ===== EMPTY STATE ===== */
        .estado-vazio {
            padding: 40px 20px;
            text-align: center;
            color: var(--cor-texto-fino);
            font-size: 14px;
        }
        .estado-vazio .icone-vazio { font-size: 32px; margin-bottom: 8px; display: block; }

        /* ===== BARRA WHATSAPP ===== */
        .barra-whatsapp {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 10px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            transform: translateY(120%);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }

        .barra-whatsapp.visivel {
            transform: translateY(0);
            pointer-events: auto;
        }

        .barra-whatsapp-inner {
            max-width: 480px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.3), 0 4px 12px rgba(0,0,0,0.15);
        }

        .barra-conteudo {
            background: linear-gradient(135deg, #075e54 0%, #128c7e 30%, #25d366 70%, #5efc82 100%);
            background-size: 200% 200%;
            animation: gradientShift 3s ease-in-out infinite;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s ease;
        }

        .barra-conteudo:active { opacity: 0.9; }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        .barra-icone {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            animation: iconFloat 2s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-2px); }
        }

        .barra-texto { flex: 1; min-width: 0; }

        .barra-texto-principal {
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.3;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .barra-texto-secundario {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 400;
            margin-top: 2px;
        }

        .barra-seta {
            color: rgba(255,255,255,0.8);
            font-size: 22px;
            flex-shrink: 0;
            animation: pulseArrow 1.5s ease-in-out infinite;
        }

        @keyframes pulseArrow {
            0%, 100% { transform: translateX(0); opacity: 0.7; }
            50%      { transform: translateX(5px); opacity: 1; }
        }

        .botao-fechar-barra {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s ease;
        }

        .botao-fechar-barra:hover { background: rgba(255,255,255,0.3); }

        /* ===== ANIMAÇÕES ===== */
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(6px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .linha-parcela { animation: popIn 0.25s ease backwards; }
        .linha-parcela:nth-child(1)  { animation-delay: 0.00s; }
        .linha-parcela:nth-child(2)  { animation-delay: 0.03s; }
        .linha-parcela:nth-child(3)  { animation-delay: 0.06s; }
        .linha-parcela:nth-child(4)  { animation-delay: 0.09s; }
        .linha-parcela:nth-child(5)  { animation-delay: 0.12s; }
        .linha-parcela:nth-child(6)  { animation-delay: 0.15s; }
        .linha-parcela:nth-child(7)  { animation-delay: 0.18s; }
        .linha-parcela:nth-child(8)  { animation-delay: 0.21s; }
        .linha-parcela:nth-child(9)  { animation-delay: 0.24s; }
        .linha-parcela:nth-child(10) { animation-delay: 0.27s; }
        .linha-parcela:nth-child(11) { animation-delay: 0.30s; }
        .linha-parcela:nth-child(12) { animation-delay: 0.33s; }
        .linha-parcela:nth-child(13) { animation-delay: 0.36s; }
        .linha-parcela:nth-child(14) { animation-delay: 0.39s; }
        .linha-parcela:nth-child(15) { animation-delay: 0.42s; }
        .linha-parcela:nth-child(16) { animation-delay: 0.45s; }
        .linha-parcela:nth-child(17) { animation-delay: 0.48s; }
        .linha-parcela:nth-child(18) { animation-delay: 0.51s; }
        .linha-parcela:nth-child(19) { animation-delay: 0.54s; }
        .linha-parcela:nth-child(20) { animation-delay: 0.57s; }
        .linha-parcela:nth-child(21) { animation-delay: 0.60s; }

        /* ===== RODAPÉ ===== */
        .rodape {
            margin-top: 16px;
            text-align: center;
            font-size: 11px;
            color: var(--cor-texto-fino);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Simulador de Parcelas</h1>
            <button class="botao-tema" id="alternarTema" aria-label="Alternar tema" title="Alternar tema">🌙</button>
        </header>

        <div class="card-input">
            <label for="valor">Valor desejado (mínimo R$ 50,00)</label>
            <div class="campo-valor">
                <span class="prefixo" aria-hidden="true">R$</span>
                <input type="number" id="valor" value="500" min="50" step="0.01" inputmode="decimal" aria-describedby="aviso">
            </div>
            <div class="aviso" id="aviso" role="alert" aria-live="assertive"></div>
        </div>

        <div class="card-input">
            <label><input type="checkbox" id="ativarCalendario"> Ativar cálculo por datas</label>
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;">
                <div style="flex:1;min-width:180px;">
                    <label for="dataRecebimento">Data de recebimento</label>
                    <input type="date" id="dataRecebimento" disabled style="width:100%;padding:10px;border:2px solid var(--cor-borda);border-radius:10px;background:var(--cor-input-bg);color:var(--cor-texto);">
                </div>
                <div style="flex:1;min-width:180px;">
                    <label for="dataPagamento">Data do primeiro pagamento</label>
                    <input type="date" id="dataPagamento" disabled style="width:100%;padding:10px;border:2px solid var(--cor-borda);border-radius:10px;background:var(--cor-input-bg);color:var(--cor-texto);">
                </div>
            </div>
        </div>

        <div class="dica">
            <span>Toque em uma opção e compartilhe no WhatsApp</span>
            <span class="emoji-dica">👇</span>
        </div>

        <div class="card-parcelas" role="region" aria-label="Tabela de parcelas">
            <div class="titulo-parcelas">Parcelas disponíveis</div>
            <ul class="lista-parcelas" id="listaParcelas" aria-live="polite"></ul>
        </div>

        
    </div>

    <!-- BARRA WHATSAPP -->
    <div class="barra-whatsapp" id="barraWhatsapp" aria-live="polite">
        <div class="barra-whatsapp-inner">
            <div class="barra-conteudo" id="barraConteudo">
                <div class="barra-icone">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                </div>
                <div class="barra-texto">
                    <div class="barra-texto-principal" id="barraTitulo">Compartilhar no WhatsApp</div>
                    <div class="barra-texto-secundario" id="barraSubtitulo">Toque para enviar</div>
                </div>
                <span class="barra-seta">›</span>
                <button class="botao-fechar-barra" id="fecharBarra" aria-label="Fechar">✕</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // TEMA
        // ============================================================
        const botaoAlternarTema = document.getElementById('alternarTema');

        if (localStorage.getItem('temaSimuladorParcelas') === 'escuro') {
            document.body.classList.add('tema-escuro');
            botaoAlternarTema.textContent = '☀️';
        }

        botaoAlternarTema.addEventListener('click', () => {
            document.body.classList.toggle('tema-escuro');
            const escuro = document.body.classList.contains('tema-escuro');
            localStorage.setItem('temaSimuladorParcelas', escuro ? 'escuro' : 'claro');
            botaoAlternarTema.textContent = escuro ? '☀️' : '🌙';
        });

        // ============================================================
        // TAXAS
        // ============================================================
        const taxasPrimeiro = {
            1: 1.100, 2: 1.110, 3: 1.118, 4: 1.118, 5: 1.125,
            6: 1.125, 7: 1.127, 8: 1.127, 9: 1.127, 10: 1.128,
            11: 1.137, 12: 1.137, 13: 1.170, 14: 1.170, 15: 1.170,
            16: 1.200, 17: 1.200, 18: 1.200, 19: 1.240, 20: 1.240, 21: 1.240
        };

        const taxasSegundo = {
            1: 1.15,  2: 1.20,  3: 1.25,  4: 1.30,  5: 1.35,
            6: 1.40,  7: 1.45,  8: 1.50,  9: 1.55, 10: 1.60,
            11: 1.65, 12: 1.70, 13: 1.75, 14: 1.85, 15: 1.90,
            16: 1.95, 17: 2.00, 18: 2.05, 19: 2.10, 20: 2.15,
            21: 2.20
        };

        // ============================================================
        // ARREDONDAMENTO
        // ============================================================
        function arredondarRegraNova(valor) {
            const v = Math.round(valor * 100) / 100;
            let resto = Math.round((v % 10) * 100) / 100;
            if (resto >= 0.01 && resto <= 5.00) return Math.round((v - resto + 5.00) * 100) / 100;
            if (resto > 5.00 && resto <= 9.99)  return Math.round((v - resto + 10.00) * 100) / 100;
            return v;
        }

        function formatar(valor) {
            return valor.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ============================================================
        // ELEMENTOS
        // ============================================================
        const inputValor     = document.getElementById('valor');
        const aviso          = document.getElementById('aviso');
        const listaParcelas  = document.getElementById('listaParcelas');
        const barraWhatsapp  = document.getElementById('barraWhatsapp');
        const barraConteudo  = document.getElementById('barraConteudo');
        const barraTitulo    = document.getElementById('barraTitulo');
        const barraSubtitulo = document.getElementById('barraSubtitulo');
        const fecharBarra    = document.getElementById('fecharBarra');
        const ativarCalendario = document.getElementById('ativarCalendario');
        const dataRecebimento = document.getElementById('dataRecebimento');
        const dataPagamento = document.getElementById('dataPagamento');

        let selecionada = null;
        let dadosCalculados = {};

        const checkSVG = `<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg>`;

        // ============================================================
        // HELPERS
        // ============================================================
        function mostrarAviso(msg) { aviso.textContent = msg; aviso.classList.add('visivel'); }
        function ocultarAviso()   { aviso.classList.remove('visivel'); aviso.textContent = ''; }
        function esconderBarra()  { barraWhatsapp.classList.remove('visivel'); selecionada = null; }

        // ============================================================
        // CÁLCULO — regra: 1x sempre visível (mínimo R$ 50),
        //                  2x–21x só se parcela >= R$ 100
        // ============================================================
        function calcular() {
            const valor = parseFloat(inputValor.value);

            if (isNaN(valor) || valor < 50) {
                if (!isNaN(valor) && valor > 0 && valor < 50) {
                    mostrarAviso('O valor mínimo é R$ 50,00.');
                } else if (isNaN(valor) || valor <= 0) {
                    mostrarAviso('Informe um valor válido (mínimo R$ 50,00).');
                }
                listaParcelas.innerHTML = '';
                esconderBarra();
                return;
            }

            ocultarAviso();
            dadosCalculados = {};

            let html = '';

            for (let qtd = 1; qtd <= 21; qtd++) {
                let indiceTaxa = qtd;
                if (ativarCalendario.checked && dataRecebimento.value && dataPagamento.value) {
                    const dias = Math.floor((new Date(dataPagamento.value)-new Date(dataRecebimento.value))/86400000);
                    if (dias > 45) indiceTaxa = Math.min(qtd+1,21);
                }
                const total1 = valor * taxasPrimeiro[indiceTaxa];
                const totalFinalBruto = total1 * taxasSegundo[indiceTaxa];
                const totalFinal      = arredondarRegraNova(totalFinalBruto);
                const parcelaBruta    = totalFinal / qtd;
                const parcela         = arredondarRegraNova(parcelaBruta);
                const totalExibido    = parcela * qtd;

                // Regra de visibilidade:
                // Se o valor desejado for menor que R$100, mantém todas as parcelas.
                // Caso contrário, oculta parcelas menores que R$80 (exceto 1x).
                // 1x sempre aparece.
// Da 2x em diante, só exibe se a parcela for de R$ 100,00 ou mais.
if (qtd >= 2 && parcela < 100) continue;

                const labelParcela = qtd === 1 ? 'à vista' : 'vezes';
                dadosCalculados[qtd] = { parcela, totalFinal: totalExibido };

                html += `
                    <li class="linha-parcela" data-qtd="${qtd}" role="button" tabindex="0"
                        aria-label="${qtd}x de R$ ${formatar(parcela)}, total R$ ${formatar(totalExibido)}">
                        <div class="lado-esquerdo">
                            <span class="badge">${qtd}x</span>
                            <span class="label-parcela">${labelParcela}</span>
                        </div>
                        <div class="lado-direito">
                            <div class="valores">
                                <span class="valor-parcela">R$ ${formatar(parcela)}</span>
                                <span class="valor-total-linha">total R$ ${formatar(totalExibido)}</span>
                            </div>
                            <div class="check-indicator">${checkSVG}</div>
                        </div>
                    </li>`;
            }

            listaParcelas.innerHTML = html;

            // Restaurar seleção se ainda válida
            if (selecionada && dadosCalculados[selecionada]) {
                const linha = listaParcelas.querySelector(`[data-qtd="${selecionada}"]`);
                if (linha) { linha.classList.add('selecionada'); atualizarBarra(selecionada); }
            } else {
                esconderBarra();
            }

            // Eventos nas linhas
            listaParcelas.querySelectorAll('.linha-parcela[data-qtd]').forEach(linha => {
                linha.addEventListener('click', () => selecionarParcela(linha));
                linha.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selecionarParcela(linha); }
                });
            });
        }

        // ============================================================
        // SELEÇÃO
        // ============================================================
        function selecionarParcela(linha) {
            const qtd = parseInt(linha.dataset.qtd);

            if (selecionada === qtd) {
                linha.classList.remove('selecionada');
                esconderBarra();
                return;
            }

            const anterior = listaParcelas.querySelector('.linha-parcela.selecionada');
            if (anterior) anterior.classList.remove('selecionada');

            linha.classList.add('selecionada');
            selecionada = qtd;
            atualizarBarra(qtd);
            if (navigator.vibrate) navigator.vibrate(10);
        }

        // ============================================================
        // BARRA WHATSAPP
        // ============================================================
        function atualizarBarra(qtd) {
            const dados = dadosCalculados[qtd];
            if (!dados) return;
            const label = qtd === 1 ? 'à vista' : `${qtd}x de R$ ${formatar(dados.parcela)}`;
            barraTitulo.textContent = label;
            barraSubtitulo.textContent = `Total: R$ ${formatar(dados.totalFinal)} · toque para enviar`;
            barraWhatsapp.classList.add('visivel');
        }

        function enviarWhatsApp() {
            if (!selecionada || !dadosCalculados[selecionada]) return;
            const dados = dadosCalculados[selecionada];
            const valor = parseFloat(inputValor.value);
            const label = selecionada === 1 ? 'à vista' : `${selecionada}x de R$ ${formatar(dados.parcela)}`;
            const mensagem = [
                `*Simulador de Parcelas*`, ``,
                `Valor: *R$ ${formatar(valor)}*`,
                `Parcelamento: *${label}*`,
                `Total com taxas: *R$ ${formatar(dados.totalFinal)}*`,
                ``, `Aguardando sua Resposta !!!`
            ].join('\n');
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`, '_blank');
        }

        barraConteudo.addEventListener('click', (e) => { if (!e.target.closest('.botao-fechar-barra')) enviarWhatsApp(); });

        fecharBarra.addEventListener('click', (e) => {
            e.stopPropagation();
            const linha = listaParcelas.querySelector('.linha-parcela.selecionada');
            if (linha) linha.classList.remove('selecionada');
            esconderBarra();
        });

        // ============================================================
        // DEBOUNCE + BLOQUEIO
        // ============================================================
        let timer;
        function calcularComDebounce() { clearTimeout(timer); timer = setTimeout(calcular, 250); }

        inputValor.addEventListener('input', calcularComDebounce);
        inputValor.addEventListener('keydown', (e) => { if (e.key === '-' || e.key === 'e' || e.key === 'E') e.preventDefault(); });

        ativarCalendario.addEventListener('change',()=>{
dataRecebimento.disabled=!ativarCalendario.checked;
dataPagamento.disabled=!ativarCalendario.checked;
calcular();
});
dataRecebimento.addEventListener('change',calcular);
dataPagamento.addEventListener('change',calcular);

calcular();
    </script>
</body>
</html>
